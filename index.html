<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Implantação Contínua - CD</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 50px;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }
        .container {
            background: rgba(255,255,255,0.15);
            border-radius: 20px;
            padding: 30px;
            display: inline-block;
        }
        button {
            background: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
            margin-top: 20px;
        }
        .badge {
            margin-top: 20px;
            font-size: 12px;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🚀 IMPLANTAÇÃO CONTÍNUA</h1>
        <p>Continuous Deployment - 100% Automático</p>
        <p>✅ Cada push é implantado automaticamente!</p>
        <p id="contador">Cliques: 0</p>
        <button onclick="contar()">Clique aqui</button>
        <div class="badge">
            🔄 Sem intervenção manual - Deploy automático
        </div>
    </div>
    <script>
        let clicks = 0;
        function contar() {
            clicks++;
            document.getElementById('contador').innerHTML = `Cliques: ${clicks}`;
        }
    </script>
</body>
</html>

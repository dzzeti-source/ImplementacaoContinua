name: Implantação Contínua

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Validar HTML
      run: |
        echo "🔍 Validando HTML..."
        if grep -q "<!DOCTYPE html>" index.html; then
          echo "✅ DOCTYPE ok"
        else
          echo "❌ Erro: DOCTYPE não encontrado"
          exit 1
        fi
        if grep -q "<title>" index.html; then
          echo "✅ Title ok"
        else
          echo "❌ Erro: Title não encontrado"
          exit 1
        fi
        echo "✅ HTML válido!"
    
    - name: Setup Pages
      uses: actions/configure-pages@v4
    
    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '.'
    
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4
